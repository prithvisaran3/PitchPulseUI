name: pitchpulse
description: Club Readiness & Injury Risk Triage for Soccer Coaches
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.1

  # Environment variables
  flutter_dotenv: ^5.1.0

  # State Management
  provider: ^6.1.2

  # UI & Animations
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1

  # Charts
  fl_chart: ^0.70.2

  # HTTP
  http: ^1.2.2

  # Camera & Media
  image_picker: ^1.1.2

  # Utilities
  intl: ^0.20.2
  shared_preferences: ^2.3.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/data/
    - assets/icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21
